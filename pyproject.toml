# ============================================================

# Davison Financial Model

# EditorConfig

#

# https://editorconfig.org/

#

# Keeps coding style consistent across editors.

# ============================================================

# Top-most EditorConfig file

root = true

# ------------------------------------------------------------

# Default settings

# ------------------------------------------------------------

[*]

charset = utf-8

end_of_line = lf

insert_final_newline = true

trim_trailing_whitespace = true

indent_style = space

indent_size = 4

# ------------------------------------------------------------

# Markdown

#

# Do not trim trailing spaces because Markdown uses them

# for explicit line breaks.

# ------------------------------------------------------------

[*.md]

trim_trailing_whitespace = false

# ------------------------------------------------------------

# YAML

# ------------------------------------------------------------

[*.{yml,yaml}]

indent_size = 2

# ------------------------------------------------------------

# JSON

# ------------------------------------------------------------

[*.json]

indent_size = 2

# ------------------------------------------------------------

# TOML

# ------------------------------------------------------------

[*.toml]

indent_size = 4

# ------------------------------------------------------------

# PowerShell

# ------------------------------------------------------------

[*.ps1]

end_of_line = crlf

# ------------------------------------------------------------

# Windows Batch Files

# ------------------------------------------------------------

[*.{bat,cmd}]

end_of_line = crlf

# ------------------------------------------------------------

# Git Commit Messages

# ------------------------------------------------------------

[COMMIT_EDITMSG]

max_line_length = 72
